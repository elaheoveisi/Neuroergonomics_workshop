<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Submit Your Work</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 650px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #222;
    }

    p.intro {
      text-align: center;
      color: #555;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #1f6feb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1558c0;
    }

    #success-message {
      color: green;
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    #error-message {
      color: red;
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    .note {
      font-size: 13px;
      color: #666;
      margin-top: -10px;
      margin-bottom: 18px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Submit Your Work</h1>
    <p class="intro">Please complete the form and attach your file.</p>

    <form
      name="submission"
      method="POST"
      data-netlify="true"
      enctype="multipart/form-data"
      onsubmit="handleSubmit(event)"
    >
      <input type="hidden" name="form-name" value="submission" />

      <div>
        <label for="name">Full Name</label>
        <input 
          id="name" 
          type="text" 
          name="name" 
          placeholder="Enter your full name" 
          required 
        />
      </div>

      <div>
        <label for="email">Email</label>
        <input 
          id="email" 
          type="email" 
          name="email" 
          placeholder="Enter your email" 
          required 
        />
      </div>

      <div>
        <label for="title">Title</label>
        <input 
          id="title" 
          type="text" 
          name="title" 
          placeholder="Enter your work title" 
          required 
        />
      </div>

      <div>
        <label for="abstract">Abstract</label>
        <textarea 
          id="abstract" 
          name="abstract" 
          rows="5" 
          placeholder="Write your abstract here"
          required
        ></textarea>
      </div>

      <div>
        <label for="attachment">Attach File</label>
        <input 
          id="attachment" 
          type="file" 
          name="attachment" 
          accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.zip"
          required 
        />
        <p class="note">Allowed file types: PDF, Word, PowerPoint, TXT, ZIP.</p>
      </div>

      <button type="submit">Submit</button>

      <p id="success-message"></p>
      <p id="error-message"></p>
    </form>
  </div>

  <script>
    async function handleSubmit(event) {
      event.preventDefault();

      const form = event.target;
      const data = new FormData(form);

      const successMessage = document.getElementById("success-message");
      const errorMessage = document.getElementById("error-message");

      successMessage.textContent = "";
      errorMessage.textContent = "";

      try {
        const response = await fetch("/", {
          method: "POST",
          body: data
        });

        if (!response.ok) {
          throw new Error("Submission failed.");
        }

        successMessage.textContent = "Your work was submitted successfully.";
        form.reset();

      } catch (error) {
        errorMessage.textContent = "Submission failed. Please try again.";
        console.error("Submission error:", error);
      }
    }
  </script>

</body>
</html>
