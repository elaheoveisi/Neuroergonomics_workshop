<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Your Work</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 650px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: #222;
    }

    .intro {
      text-align: center;
      color: #555;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #1f6feb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1558c0;
    }

    .note {
      font-size: 13px;
      color: #666;
      margin-top: -10px;
      margin-bottom: 18px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Submit Your Work</h1>
    <p class="intro">Please complete the form and attach your file.</p>

    <form
      name="submission"
      method="POST"
      data-netlify="true"
      enctype="multipart/form-data"
      action="/thank-you.html"
    >
      <input type="hidden" name="form-name" value="submission" />

      <label for="name">Full Name</label>
      <input 
        id="name" 
        type="text" 
        name="name" 
        placeholder="Enter your full name" 
        required 
      />

      <label for="email">Email</label>
      <input 
        id="email" 
        type="email" 
        name="email" 
        placeholder="Enter your email" 
        required 
      />

      <label for="title">Title</label>
      <input 
        id="title" 
        type="text" 
        name="title" 
        placeholder="Enter your work title" 
        required 
      />

      <label for="abstract">Abstract</label>
      <textarea 
        id="abstract" 
        name="abstract" 
        rows="5" 
        placeholder="Write your abstract here"
        required
      ></textarea>

      <label for="attachment">Attach File</label>
      <input 
        id="attachment" 
        type="file" 
        name="attachment" 
        accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.zip"
        required 
      />
      <p class="note">Allowed file types: PDF, Word, PowerPoint, TXT, ZIP.</p>

      <button type="submit">Submit</button>
    </form>
  </div>

</body>
</html>
