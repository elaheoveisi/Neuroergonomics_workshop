<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neuroergonomics Workshop Submissions</title>

    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        background: #f5f7fb;
        color: #1b1f24;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
      }

      h1 {
        margin-bottom: 0.5rem;
      }

      .card {
        background: #ffffff;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(10, 20, 40, 0.08);
        padding: 1rem;
        margin-top: 1rem;
      }

      form {
        display: grid;
        gap: 0.75rem;
      }

      label {
        font-weight: 600;
      }

      input,
      textarea,
      button {
        width: 100%;
        box-sizing: border-box;
        font-size: 1rem;
        padding: 0.6rem;
        border-radius: 8px;
      }

      input,
      textarea {
        border: 1px solid #c4cbd8;
      }

      input[type='file'] {
        padding: 0.45rem;
        background: #ffffff;
      }

      button {
        border: none;
        background: #1f6feb;
        color: #ffffff;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #1758b8;
      }

      #form-message {
        margin: 0;
        min-height: 1.2rem;
      }

      #form-message.error {
        color: #a40e26;
      }

      #form-message.success {
        color: #1f6feb;
      }

      .muted {
        color: #5a6472;
      }

      .note {
        font-size: 0.95rem;
        line-height: 1.4;
        background: #f6f8ff;
        border: 1px solid #d8e2ff;
        padding: 0.75rem;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>Neuroergonomics Workshop</h1>
      <p class="muted">
        Submit your work for review by completing the form below.
      </p>

      <section class="card" aria-labelledby="submission-form-heading">
        <h2 id="submission-form-heading">Submit your work</h2>

        <p class="note">
         Submission deadline: May 20th (2026).
          <br />
          <strong>Submission email:</strong>
          <a href="mailto:elahe.oveisi@okstate.edu">elahe.oveisi@okstate.edu</a>
        </p>

        <!--
          IMPORTANT:
          GitHub Pages is static, so it cannot send emails by itself.

          To receive submissions by email, including file attachments:
          1. Create a form endpoint using a service such as Formspree, Getform, Basin, or Netlify Forms.
          2. Replace PASTE_YOUR_FORM_ENDPOINT_HERE with your real form endpoint.
          3. Configure the form service to send submissions to elahe.oveisi@okstate.edu.

          Submitted work is not shown on this website.
        -->

        <form
          id="submission-form"
          method="POST"
          enctype="multipart/form-data"
          action="PASTE_YOUR_FORM_ENDPOINT_HERE"
        >
          <div>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required />
          </div>

          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>

          <div>
            <label for="title">Project title</label>
            <input id="title" name="title" type="text" required />
          </div>

         <div>
           <label for="abstract">Abstract (150 words)</label>
           <textarea id="abstract" name="abstract" rows="4" maxlength="1200" required></textarea>
         </div>

          <div>
            <label for="attachment">Attach your file</label>
            <input
              id="attachment"
              name="attachment"
              type="file"
              required
              accept=".pdf,.doc,.docx"
            />
            <p class="muted" style="margin: 0.25rem 0 0">
              Accepted files: PDF, Word.
            </p>
          </div>

          <input
            type="hidden"
            name="_subject"
            value="New Neuroergonomics Workshop Submission"
          />

          <input type="hidden" name="_replyto" value="" />

          <input
            type="hidden"
            name="send_to"
            value="elahe.oveisi@okstate.edu"
          />

          <button type="submit">Submit work</button>

          <p id="form-message" class="muted" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById('submission-form');
      const formMessage = document.getElementById('form-message');

      function showFormMessage(type, message) {
        formMessage.className = type;
        formMessage.textContent = message;
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        if (form.action.includes('PASTE_YOUR_FORM_ENDPOINT_HERE')) {
          showFormMessage(
            'error',
            'The form is not configured yet. Please contact the organizer.'
          );
          return;
        }

        if (!form.checkValidity()) {
          form.reportValidity();
          showFormMessage(
            'error',
            'Please complete all fields and attach your file.'
          );
          return;
        }

        try {
          showFormMessage('muted', 'Sending...');

          const formData = new FormData(form);

          const email = formData.get('email');
          if (email && !formData.get('_replyto')) {
            formData.set('_replyto', String(email));
          }

          const response = await fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
              Accept: 'application/json'
            }
          });

          if (!response.ok) {
            throw new Error('Submission failed');
          }

          form.reset();

          showFormMessage(
            'success',
            'Submission received. Thank you!'
          );
        } catch (error) {
          showFormMessage(
            'error',
            'Unable to send your submission right now. Please try again.'
          );
        }
      });
    </script>
  </body>
</html>
